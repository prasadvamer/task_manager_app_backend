default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= ENV["DATABASE_USER"] %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  host: <%= ENV["DATABASE_HOST"] %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432).to_i %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "backend_api_development") %>

test:
  <<: *default
  database: backend_api_test

production:
  primary: &primary_production
    <<: *default
    database: backend_api_production
    username: backend_api
    password: <%= ENV["BACKEND_API_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: backend_api_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: backend_api_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: backend_api_production_cable
    migrations_paths: db/cable_migrate
